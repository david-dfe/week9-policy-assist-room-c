<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>PolicyAssist</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; color: #0b0c0c; }
    h1 { border-bottom: 4px solid #1d70b8; padding-bottom: .3rem; }
    .tag { background: #1d70b8; color: #fff; font-size: .7rem; padding: 2px 8px; vertical-align: middle; }
    #chat { border: 1px solid #b1b4b6; padding: 1rem; min-height: 300px; max-height: 480px; overflow-y: auto; }
    .q { background: #f3f2f1; padding: .6rem .8rem; margin: .5rem 0; }
    .a { border-left: 4px solid #1d70b8; padding: .6rem .8rem; margin: .5rem 0 1.2rem; white-space: pre-wrap; }
    form { display: flex; gap: .5rem; margin-top: 1rem; }
    input[type=text] { flex: 1; padding: .6rem; border: 2px solid #0b0c0c; font-size: 1rem; }
    button { background: #00703c; color: #fff; border: 0; padding: .6rem 1.2rem; font-size: 1rem; cursor: pointer; }
    button:disabled { background: #b1b4b6; }
    .hint { color: #505a5f; font-size: .85rem; }
    .error-banner { background: #d4351c; color: #fff; padding: .6rem .8rem; margin: .5rem 0; }
  </style>
</head>
<body>
  <h1>PolicyAssist <span class="tag">INTERNAL</span></h1>
  <p class="hint">Ask a question about the Border Force Operational Manual. Answers are generated by AI — verify against the manual before acting.</p>

  <div id="error" class="error-banner" role="alert" hidden></div>

  <div id="chat">
    {% for entry in history %}
      <div class="q">{{ entry.question }}</div>
      <div class="a">{{ entry.answer }}</div>
    {% endfor %}
  </div>

  <form id="form">
    <input type="text" id="question" placeholder="e.g. How often are welfare checks required?" autocomplete="off" required>
    <button id="send" type="submit">Ask</button>
  </form>

  <script>
    const form = document.getElementById('form');
    const chat = document.getElementById('chat');
    const input = document.getElementById('question');
    const send = document.getElementById('send');
    const errorBanner = document.getElementById('error');

    function showError(message) {
      errorBanner.textContent = message;
      errorBanner.hidden = false;
    }

    function clearError() {
      errorBanner.hidden = true;
      errorBanner.textContent = '';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();
      const question = input.value;
      send.disabled = true;

      let res;
      let data;
      try {
        res = await fetch('/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question })
        });
        data = await res.json();
      } catch (err) {
        showError('Network error. Please try again.');
        send.disabled = false;
        return;
      }

      if (!res.ok) {
        // Keep the question in the input so the officer can retry
        // without retyping. Do NOT append it to the chat transcript.
        showError((data && data.error) || 'Something went wrong. Please try again.');
        send.disabled = false;
        return;
      }

      // Success: only now commit the question + answer to the transcript.
      chat.insertAdjacentHTML('beforeend', '<div class="q"></div>');
      chat.lastElementChild.textContent = question;
      chat.insertAdjacentHTML('beforeend', '<div class="a"></div>');
      chat.lastElementChild.textContent = data.answer;
      chat.scrollTop = chat.scrollHeight;
      input.value = '';
      send.disabled = false;
    });
  </script>
</body>
</html>

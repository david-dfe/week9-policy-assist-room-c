name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Tuesday 05:23 UTC — SAST catches drift even when nobody's
    # opening PRs (e.g. quiet-week regressions in transitive deps).
    - cron: "23 5 * * 2"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: analyze (python)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          persist-credentials: false
      - name: Initialise CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-extended,security-and-quality
      - name: Analyse
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"

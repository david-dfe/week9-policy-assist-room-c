version: 2

updates:
  # Python dependencies (pyproject.toml).
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 5
    labels: ["dependencies", "python"]
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    groups:
      opentelemetry:
        patterns:
          - "opentelemetry-*"
      langchain:
        patterns:
          - "langchain-*"
      dev-tooling:
        dependency-type: "development"
        patterns:
          - "ruff"
          - "mypy"
          - "pytest*"
          - "bandit*"
          - "pip-audit"
          - "pre-commit"
          - "types-*"

  # GitHub Actions used by our workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 5
    labels: ["dependencies", "github-actions"]
    commit-message:
      prefix: "ci"
      include: "scope"
